<!DOCTYPE html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PetCart - Admin Panel Manager</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>

        <link rel="stylesheet" href="Dog.css">

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Outfit', 'sans-serif']
                        },
                        colors: {
                            slateDark: '#120e0b',
                            cardDark: 'rgba(35, 27, 20, 0.6)',
                            accentAmber: '#d97706',
                        }
                    }
                }
            }
        </script>
    </head>
    <body class="bg-slateDark text-gray-100 flex flex-col min-h-full">
        <header class="sticky top-0 z-40 w-full glass-panel border-b border-orange-900/20">
            <div class = "max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
                <a href="Dog.html" class="flex items-center space-x-3 group">
                    <div class="h-10 w-10 rounded-xl bg-gradient-amber flex items-center justify-center shadow-lg shadow-amber-500/20 group-hover:scale-105 transition-transform duration-300">
                        <i data-lucide="paw-print" class="h-5 w-5 text-white"></i>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-white">
                        Pet<span class="text-gradient">Cart</span>
                    </span>
                </a>

                <a href="Dog.html" class="relative p-2.5 rounded-xl bg-gray-900/60 border border-amber-900/30 text-amber-200/80 hover:text-white hover:border-amber-700 hover:bg-gray-900/80 transition-all duration-200 group flex items-center gap-2">
                    <i data-lucide="layout-grid" class="h-5 w-5 group-hover:scale-105 transition-transform duration-200"></i>
                    <span class="hidden sm:inline text-sm font-medium">View Storefront</span>
                </a>
            </div>
        </header>

        <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <section class="space-y-8 animate-scale-up">
                <div class="relative rounded-3xl overflow-hidden p-8 sm:p-12 shadow-2xl min-h-[320px] flex items-center bg-gray-950">
                    
                    <img src="images/banner_bg.png" alt="puppies playing background" class="absolute inset-0 w-full h-full object-cover opacity-75">
                    <div class="absolute inset-0 bg-[radial-gradient(ellipse-at-top-right,_var(--tw-gradient-stops))] from-amber-400/20 via-orange-950/15 to-transparent"></div>
                    <div class="relative z-10 max-w-xl space-y-4">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-white/10 text-amber-100/90 border border-white/15">
                            <span class="w-2 h-2 rounded-full bg-amber-400 animate-ping"></span>Database Management
                        </span>
                        <h1 class="text-4xl sm:text-5xl font-extrabold text-white leading-tight">
                           Catalog Manager Portal
                        </h1>
                        <p class="text-amber-100 text-sm sm:text-base leading-relaxed text-gray-200/90">
                            Add, delete, or manage breed listings in the petCart catalog database dynamically.
                        </p>
                    </div>
                </div>

                <section class="glass-panel p-6 sm:p-8 rounded-xl border border-amber-900/30 space-y-6">
                    <div class="flex items-center justify-between border-b border-amber-950/40 pb-4">
                        <h2 class="text-xl font-bold text-white flex items-center gap-2">
                            <i data-lucide="plus-circle" class="h-6 w-6 text-amber-500"></i>Add New Pet to Catalog
                        </h2>
                        <span class="text-xs text-amber-300 bg-amber-950 px-2.5 py-1 rounded-full border border-amber-900/60 font-semibold uppercase tracking-wider">Form Editor</span>
                    </div>

                    <form id="add-pet-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" novalidate>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-300">Breed Name *</label>
                            <input type="text" id="admin-title" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-sm text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="e.g. Beagle, Poodle...">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-300">Size Category *</label>
                            <select id="admin-category" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-sm text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 cursor-pointer">
                                <option value="small">Small</option>
                                <option value="medium">Medium</option>
                                <option value="large">Large</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-300">Adoption Fee (Rs) *</label>
                            <input type="number" id="admin-price" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-sm text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="e.g. 8500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-300">Rating (1.0 to 5.0) *</label>
                            <input type="number" id="admin-rating" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-sm text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="e.g. 4.5">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-300">Dog Image File *</label>
                            <input type="file" id="admin-image-file" accept="image/*" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-xs text-gray-400 file:mr-3 file:py-1 file:px-2.5 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-amber-600 file:text-white hover:file:bg-amber-500 cursor-pointer">
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-semibold text-gray-300">Availability Status </label>
                            <select id="admin-stock" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-sm text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 cursor-pointer">
                                <option value="true">Available</option>
                                <option value="false">Adopted</option>
                            </select>
                        </div>
                        <div class="space-y-1 md:col-span-2 lg:col-span-3">
                            <label class="text-xs font-semibold text-gray-300">Short Description *</label>
                            <textarea id="admin-description" rows="3" class="w-full px-4 py-2.5 rounded-xl bg-gray-900/60 border border-amber-950/40 text-sm text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500" placeholder="e.g. playful and friendly temperament, great with kids..."></textarea>
                        </div>
                        <div class="md:col-span-2 lg:col-span-3 flex justify-end gap-3 pt-2">
                            <button type="button" id="admin-cancel-btn" class="px-5 py-2.5 rounded-xl bg-gray-900 text-xs font-semibold text-gray-400 hover:text-white border border-gray-800 transition-colors">
                                clear Form
                            </button>
                            <button type="submit" class="px-6 py-2.5 rounded-xl bg-amber-600 text-xs font-semibold text-white hover:bg-amber-500 shadow-md shadow-amber-500/10 border border-amber-500 transition-colors">
                                Save Pet Breed
                            </button>
                        </div>
                    </form>
                </section>
            </section>
        </main>

        <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-md w-full"></div>

        <footer class="mt-auto border-t border-amber-900/30 bg-gray-950/30 py-6">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-x-6 text-sm text-amber-400 mb-2">
                <a href="#" class="hover:text-white transition-colors">Find Pets</a>
                <a href="#" class="hover:text-white transition-colors">Guidelines</a>
                <a href="#" class="hover:text-white transition-colors">Adoption Terms</a>
            </div>
            <div>PetCart &copy; 2026. All rights reserved.</div>
        </footer>

        <script src="admin.js"></script>
    </body>
</html>
