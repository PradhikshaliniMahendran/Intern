<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Password Strength Checker</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans:['Inter', 'sans-serif'],

                        },
                        animation: {
                            'pulse-glow-green': 'pulseGlowGreen 2s infinite ease-in-out',
                            'shake': 'shake .4s ease',
                        },
                        keyframes: {
                            pulseGlowGreen: {
                                '0%, 100%': { boxShadow: '0 0 0 3px rgba(34,197,94,0)'},
                                '50%': {boxShadow: '0 0 0 6px rgba(34,197,94,0.15)'},
                            },
                            shake: {
                                '0%, 100%': { transform: 'translateX(0)' },
                                '20%, 60%': {transform: 'translateX(-7px)'},
                                '40%, 80%': {transform: 'translateX(7px)'},
                            }
                        }
                    }
                }
            }
        </script>
        <style>
            .glass-card {
                background: rgb(10, 10, 62);
                backdrop-filter: blur(28px);
                -webkit-backdrop-filter: blur(28px);
                border: 1px solid  rgba(255, 255, 255, 0.08);
                box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0  rgba(255, 255, 255, 0.06);
            }

            .check-icon-border {
                border: 1.5px solid #334155;
            }
        </style>
    </head>
    <body class="min-h-full flex items-center justify-center bg-[#0f172a] p-6 bg-cover bg-center bg-no-repeat bg-fixed" style="background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('C:/Users/mahen/Downloads/4dd26f3a9d6cde75d93b921a9fd5e5e8.jpg');">
    <div class="glass-card w-full max-w-[440px] rounded-[1.5rem] p-10">
        
        <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-pink-500 rounded-2xl flex items-center justify-center text-2xl mb-[1.4rem] shadow[0_8px_24px_rgba(9,9,33,0.4)]">
            🔐
        </div>
        <h1 class="text-2xl font-extrabold text-slate-50 mb-1">Password Checker</h1>
        <p class="text-sm text-slate-500 mb-8">Create a Strong, secure password in real time.</p>

        <label for="pwd-input" class="block text-xs font-bold tracking-[0.07em] uppercase text-slate-400 mb-[0.6rem]">Enter Password</label>
        <div class="relative mb-[1.4rem]">
            <input
                id="pwd-input"
                type="password"
                placeholder="Type your password..."
                oninput="checkPassword(this.value)"
                autocomplete="off"
                class="w-full bg-slate-800/70 border border-white/8 rounded-[0.875rem] py-3.5 pl-[1.1rem] pr-12 text-base text-slate-100 placeholder-slate-600 outline-none transition-all duration-200 tracking-wider focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/20"/>
            <button class="absolute right-[0.9rem] top-1/2 -translate-y-1/2 bg-none border-none cursor-pointer text-lg text-slate-600 hover:text-slate-400 select-none leading-none transition-colors duration-200" onclick="toggleVisibility()" id="eye-btn" title="Show/Hide">👁️</button>
        </div>

        <div class="mb-[1.4rem]">
            <div class="flex justify-between items-center mb-[0.6rem]">
                <span class="text-[0.78rem] font-bold tracking-[0.07em] uppercase text-slate-500">Strength</span>
                <span class="text-[0.78rem] font-bold px-0 py-0.5 rounded-full transition-all duration-300 bg-slate-500/15 text-slate-500" id="strength-badge">-</span>
            </div>
            <div class="flex gap-1.5 h-[7px]">
                <div class="flex-1 rounded-full bg-white/5 overflow-hidden relative"><div class="h-full w-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]" id="seg1"></div></div>
                <div class="flex-1 rounded-full bg-white/5 overflow-hidden relative"><div class="h-full w-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]" id="seg2"></div></div>
                <div class="flex-1 rounded-full bg-white/5 overflow-hidden relative"><div class="h-full w-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]" id="seg3"></div></div>
            </div>
        </div>

        <ul class="list-none flex flex-col gap-2 mb-6">
            <li id="chk-len" class="flex items-center gap-2.5 text-[0.84rem] text-slate-500 transition-colors duration-300">
                <span class="w-[18px] h-[18px] rounded-full check-icon-border flex items-center justify-center text-[0.6rem] shrink-0 transition-all duration-300 bg-transparent" id="icon-len">✓</span>
                At least 8 Characters
            </li>

            <li id="chk-upper" class="flex items-center gap-2.5 text-[0.84rem] text-slate-500 transition-colors duration-300">
                <span class="w-[18px] h-[18px] rounded-full check-icon-border flex items-center justify-center text-[0.6rem] shrink-0 transition-all duration-300 bg-transparent" id="icon-upper">✓</span>
                Contains uppercase letter (A-Z)
            </li>

            <li id="chk-num" class="flex items-center gap-2.5 text-[0.84rem] text-slate-500 transition-colors duration-300">
                <span class="w-[18px] h-[18px] rounded-full check-icon-border flex items-center justify-center text-[0.6rem] shrink-0 transition-all duration-300 bg-transparent" id="icon-num">✓</span>
                Contains a number (0-9)
            </li>

            <li id="chk-special" class="flex items-center gap-2.5 text-[0.84rem] text-slate-500 transition-colors duration-300">
                <span class="w-[18px] h-[18px] rounded-full check-icon-border flex items-center justify-center text-[0.6rem] shrink-0 transition-all duration-300 bg-transparent" id="icon-special">✓</span>
                Contains special character (!@#$...)
            </li>
        </ul>

        <div class="min-h-[1.4rem] text-[0.85rem] font-semibold text-center p-3 rounded-[0.75rem] mb-6 transition-all duration-300 opacity-0 translate-y-1 border border-transparent" id="val-msg"></div>

        <div class="h-1 rounded-full w-full mt-6 bg-white/5 overflow-hidden relative">
            <div class="h-full w-0 rounded-full transition-all duration-500 ease-[cubic-bezier(0.4,0,0.2,1)]" id="indicator-fill"></div>
        </div>

        <button class="w-full py-[0.95rem] border-none rounded-[0.875rem] text-[0.95rem] font-bold cursor-pointer transition-all duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-[0_8px_24px_rgba(99,102,241,0.35)] hover:-translate-y-0.5 hover:shadow-[0_12px_32px_rgba(99,102,241,0.5)] active:translate-y-0 mt-6" onclick="handleSubmit()">
           ✅ Check My Password
        </button>

        <p class="text-center text-[0.75rem] text-slate-600 mt-4">Your password is never stored or sent anywhere.</p>
    </div>
    <script>
        const input = document.getElementById('pwd-input');
        const badge = document.getElementById('strength-badge');
        const valMsg = document.getElementById('val-msg');
        const indicator = document.getElementById('indicator-fill');
        const segments = [
            document.getElementById('seg1'),
            document.getElementById('seg2'),
            document.getElementById('seg3'),
        ];

        const checks ={
            len : document.getElementById('chk-len'),
            upper : document.getElementById('chk-upper'),
            num : document.getElementById('chk-num'),
            special : document.getElementById('chk-special'),
        };

        function evaluatePassword(pwd) {
            const hasLength = pwd.length >= 8;
            const hasUpper = pwd !== pwd.toLowerCase();
            const hasNumber = /[0-9]/.test(pwd);
            const hasSpecial = /[!@#$%^&*()_+=\-{}|;:'",.<>?/`~]/.test(pwd);

            let score = 0;
            if (hasLength) score++;
            if (hasUpper) score++;
            if (hasNumber) score++;
            if (hasSpecial) score++;

            return {hasLength, hasUpper, hasNumber, hasSpecial, score};
        }

        function checkPassword(pwd) {
            if (pwd.length === 0) {
                resetUI();
                return;
            }

            const {hasLength, hasUpper, hasNumber, hasSpecial, score} = evaluatePassword(pwd);


            setCheck('len', hasLength);
            setCheck('upper', hasUpper);
            setCheck('num', hasNumber);
            setCheck('special', hasSpecial);

            let level, color, barWidth, message;

            if(score <= 1){
                level = 'weak';
                color = '#ef4444';
                barWidth = 33;
                message = 'Too weak - hackers crack this in seconds!'

            } else if (score === 2 || score === 3) {
                level = 'medium';
                color = '#eab308';
                barWidth = 66;;
                message = 'Getting better! Add more variety to strengthen it.';
            } else {
                level = 'strong';
                color = '#22c55e';
                barWidth = 100;
                message = 'Excellent! This is a very strong, secure password.';
            }

            segments.forEach((seg, i) => {
                if (i < score) {
                    seg.style.width = '100%';
                    seg.style.background = color;
                } else {
                    seg.style.width = '0%';
                    seg.style.background = 'transparent';
                }
            });

            badge.textContent = level.charAt(0).toUpperCase() + level.slice(1);

            badge.className = "text-[0.78rem] font-bold px-3 py-0.5 rounded-full transition-all duration-300";
            if (level === 'weak') {
                badge.classList.add('bg-red-500/15', 'text-red-400');
            } else if (level === 'medium') {
                badge.classList.add('bg-yellow-500/15', 'text-yellow-400');
            } else {
                badge.classList.add('bg-green-500/15', 'text-green-400');
            }

            indicator.style.width = barWidth + '%';
            indicator.style.background = color;

            if (level === 'strong') {
                input.classList.add('animate-pulse-glow-green', 'border-green-500');
                input.classList.remove('focus:border-indigo-500', 'focus:ring-indigo-500/20');
            } else {
                input.classList.remove('animate-pulse-glow-green', 'border-green-500');
                input.classList.add('focus:border-indigo-500', 'focus:ring-indigo-500/20');
            }

            valMsg.textContent = message;
            valMsg.className = 'min-h-[1.4rem] text-[0.85rem] font-semibold text-center p-3 rounded-[0.75rem] mb-6 transition-all duration-300 opacity-100 translate-y-0 border';
            if (level === 'weak') {
                valMsg.classList.add('bg-red-500/10','border-red-500/20', 'text-red-400');
            }else if (level === 'medium') {
                valMsg.classList.add('bg-yellow-500/10','border-yellow-500/20', 'text-yellow-400');
            }else {
                valMsg.classList.add('bg-green-500/10','border-green-500/20', 'text-green-400');
            }
        }

        function setCheck(key, pass) {
            const li = checks[key];
            const icon = li.querySelector('span');
            if (pass) {
                li.classList.add('text-green-400');
                li.classList.remove('text-slate-500');
                icon.classList.add('bg-green-500/20', 'border-green-400', 'text-green-400');
                icon.classList.remove('bg-transparent', 'check-icon-border');
            } else {
                li.classList.remove('text-green-400');
                li.classList.add('text-slate-500');
                icon.classList.remove('bg-green-500/20', 'border-green-400', 'text-green-400');
                icon.classList.add('bg-transparent', 'check-icon-border');
            }
        }

        function resetUI() {
            segments.forEach(seg => { seg.style.width = '0%';});
            badge.textContent = '_';
            badge.className = 'text-[0.78rem] font-bold px-3 py-0.5 rounded-full transition-all duration-300 bg-slate-500/15 text-slate-500';
            valMsg.className = 'min-h-[1.4rem] text-[0.85rem] font-semibold text-center p-3 rounded-[0.75rem] mb-6 transition-all duration-300 opacity-0 translate-y-1 border border-transparent';
            valMsg.textContent = '';
            indicator.style.width = '0%';
            input.classList.remove('animate-pulse-glow-green', 'border-green-500');
            input.classList.add('focus:border-indigo-500', 'focus:ring-indigo-500/20');
            Object.keys(checks).forEach(k => setCheck(k, false));
        }

        function toggleVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeBtn = document.getElementById('eye-btn');
            if(pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeBtn.textContent = '🔒';
            } else {
                pwdInput.type = 'password';
                eyeBtn.textContent = '👁️';
            }
        }

        function handleSubmit() {
            const pwd = input.value;

            if (pwd.trim().length === 0) {
                input.classList.add('animate-shake');
                setTimeout(() => input.classList.remove('animate-shake'), 400);
                return;
            }

            const {score} = evaluatePassword(pwd);

            if (score < 4) {
                input.classList.add('animate-shake');
                setTimeout(() => input.classList.remove('animate-shake'), 400);
                valMsg.textContent = 'Please create a stonger password first!';
                valMsg.className = 'min-h-[1.4rem] text-[0.85rem] font-semibold text-center p-3 rounded-[0.75rem] mb-6 transition-all duration-300 opacity-100 translate-y-0 border bg-red-500/10 border-red-500/20 text-red-400';
            } else {
                valMsg.textContent = 'Perfect! your password is secure and ready to use.';
                valMsg.className = 'min-h-[1.4rem] text-[0.85rem] font-semibold text-center p-3 rounded-[0.75rem] mb-6 transition-all duration-300 opacity-100 translate-y-0 border bg-green-500/10 border-green-500/20 text-green-400';

            }
        }

    </script>

        
    </body>
</html>
