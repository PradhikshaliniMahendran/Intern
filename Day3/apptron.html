            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform:translateY(-30px);
            }

            to {
                opacity: 1;
                transform:translateY(0);
            }
        }

        @keyframes fadeLeft {
            from {
                opacity: 0;
                transform:translateX(-50px);
            }

            to {
                opacity: 1;
                transform:translateX(0);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes shimmerSweep {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .skeleton-bone {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: shimmerSweep 1.5s infinite linear;
        }

        @keyframes slowPulse {
            0%, 100% { opacity: 0.3;}
            50% {opacity: 1;}
        }

        .pulse-slow {
            animation: slowPulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% {transform: rotate(360deg);}
        }

        .animate.spin {
            animation: spin 1s linear infinite;
        }

    </style>

    <script>
        let parcent = 0;
        const percentInterval = setInterval(() => {
            parcent += 2;
            const percentElement = document.getElementById('loadingPercent');
            const progressFill = document.getElementById('progressFill');
            const progressFillBar = document.getElementById('progressFillBar');

            if (percentElement) percentElement.innerText = percent + '%';
            if (progressFill) progressFill.style.width = percent + '%';
            if (progressFillBar) progressFillBar.style.width = percent + '%';

            if (percent => 100) clearInterval(percentInterval);
        }, 50);
        window.addEventListener("load", () => {
            setTimeout(() => {
                const loader = document.getElementById("loader");
                const content = document.getElementById("content");

                loader.style.opacity = "0";
                loader.style.transform = "scale(1.05)";

                content.classList.remove("opacity-0");

                setTimeout(() => {
                    loader.style.display = "none";
                }, 800);
                
            }, 2500);
        });

        const menuBtn = document.getElementById('menu-btn');
        const navLinks = document.getElementById('nav-links');
        const hamburgerIcon = document.getElementById('hamburger-icon');
        const closeIcon = document.getElementById('close-icon');

        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('hidden');
            navLinks.classList.toggle('flex');

            hamburgerIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('hidden');
        });

        document.querySelectorAll('#nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 768) {
                    navLinks.classList.add('hidden');
                    navLinks.classList.remove('flex');
                    hamburgerIcon.classList.remove('hidden');
                    closeIcon.classList.add('hidden');
                }
            });
        });

    </script>
